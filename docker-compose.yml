services:
  postgres:
    container_name: torin-postgres
    image: postgres:17
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-torin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-torin}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - ${POSTGRES_PORT:-5432}:5432
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-torin}']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    shm_size: 128mb

  temporal-postgres:
    container_name: torin-temporal-postgres
    image: postgres:17
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
      POSTGRES_DB: temporal
    volumes:
      - temporal_postgres_data:/var/lib/postgresql/data
    ports:
      - 5433:5432
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U temporal']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    shm_size: 128mb

  temporal:
    container_name: torin-temporal
    image: temporalio/auto-setup:latest
    depends_on:
      temporal-postgres:
        condition: service_healthy
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=temporal-postgres
    ports:
      - 7233:7233
    restart: always

  temporal-ui:
    container_name: torin-temporal-ui
    image: temporalio/ui:latest
    depends_on:
      - temporal
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:3000
    ports:
      - 8233:8080
    restart: always

volumes:
  postgres_data:
  temporal_postgres_data: